version: '3.9'

services:
  backend:
    build: ./backend
    container_name: analyserx-backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-analyserx-secret-key}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-jwt-analyserx-secret}
      - DATABASE_URL=sqlite:////app/data/analyserx.db
    volumes:
      - backend_data:/app/data
      - uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - analyserx-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/auth/me"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: analyserx-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - analyserx-net

volumes:
  backend_data:
  uploads:

networks:
  analyserx-net:
    driver: bridge
